# ============================================================================
#  Greyscale Minimal Theme - Kitty Terminal
# ============================================================================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# Cursor
cursor                  #7f12ff
cursor_text_color       #0a0a0a
cursor_shape            block
cursor_blink_interval   0

# Scrollback
scrollback_lines        10000

# Mouse
mouse_hide_wait         2.0
url_color               #7f12ff
url_style               single

# Window
window_padding_width    8
hide_window_decorations yes
confirm_os_window_close 0

# Tab bar
tab_bar_style           separator
tab_separator           " | "
active_tab_foreground   #7f12ff
active_tab_background   #0a0a0a
inactive_tab_foreground #606060
inactive_tab_background #0a0a0a
tab_bar_background      #0a0a0a

# ============================================================================
#  Color Scheme - Greyscale with Green Accent
# ============================================================================

# Background/Foreground
background              #0a0a0a
foreground              #a0a0a0
selection_background    #252525
selection_foreground    #e0e0e0

# Black (grey scale)
color0                  #1a1a1a
color8                  #404040

# Red
color1                  #707070
color9                  #909090

# Green (accent)
color2                  #7f12ff
color10                 #9d4edd

# Yellow
color3                  #808080
color11                 #a0a0a0

# Blue
color4                  #606060
color12                 #808080

# Magenta
color5                  #707070
color13                 #909090

# Cyan
color6                  #6b21a8
color14                 #7f12ff

# White
color7                  #a0a0a0
color15                 #e0e0e0
