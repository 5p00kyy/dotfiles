# ============================================================================
#  Operator Console Theme - Kitty Terminal
# ============================================================================

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

cursor                  #3fb950
cursor_text_color       #0d1117
cursor_shape            block
cursor_blink_interval   0

scrollback_lines        20000
mouse_hide_wait         2.0
url_color               #79c0ff
url_style               single

window_padding_width    8
hide_window_decorations yes
confirm_os_window_close 0

tab_bar_style           separator
tab_separator           " | "
active_tab_foreground   #3fb950
active_tab_background   #0d1117
inactive_tab_foreground #6e7681
inactive_tab_background #0d1117
tab_bar_background      #0d1117

background              #0d1117
foreground              #c9d1d9
selection_background    #1f6feb
selection_foreground    #ffffff

color0                  #161b22
color8                  #484f58
color1                  #ff7b72
color9                  #ffa198
color2                  #3fb950
color10                 #56d364
color3                  #d29922
color11                 #e3b341
color4                  #58a6ff
color12                 #79c0ff
color5                  #bc8cff
color13                 #d2a8ff
color6                  #39c5cf
color14                 #56d4dd
color7                  #b1bac4
color15                 #f0f6fc
