################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

#Desktop
monitor = DP-1,2560x1440@165,0x0,auto,bitdepth,12,vrr,1
#monitor = DP-1,3840x2160@60,0x0,auto,bitdepth,12,vrr,1
#monitor = DP-2,1920x1080@144,2560x0,auto,bitdepth,12,vrr,1
monitor = DP-2,1920x1080@144,2560x0,auto,bitdepth,12,vrr,1
#monitor = DP-3,1920x1080@144,2560x0,auto,bitdepth,12,vrr,1

#TV
#monitor = HDMI-A-1,3840x2160@60,4480x0,auto,bitdepth,10
#monitor = HDMI-A-1,1920x1080@120,4480x0,auto,bitdepth,10

#Mirror
#monitor = DP-1,3840x2160@60,0x0,auto,bitdepth,12,vrr,1
#monitor = DP-3,1920x1080@144,auto,auto,bitdepth,12,vrr,1
monitor = HDMI-A-1,3840x2160@60,auto,auto,bitdepth,10,mirror,DP-1
#monitor = HDMI-A-1,1920x1080@120,auto,auto,bitdepth,10,mirror,DP-1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = brave

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = waybar & swaync & hyprpaper
exec-once = /home/pacey/.config/hypr/scripts/wallpaper.sh

exec-once = nm-applet --indicator & blueman-applet

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = /home/pacey/.config/hypr/xdg-portal-hyprland

exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = /usr/bin/1password & sleep 1 && kitty

# AUTO LAUNCH STEAM BIG PICTURE

#exec-once= gamescope -e -f -w 2560 -h 1440 -r 165 --hdr-enabled -- steam -gamepadui -steamos3

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 10

    col.active_border = rgb(7f12ff)
    col.inactive_border = rgba(25252588)

    border_size = 2

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.97

    # No shadows for clean minimal look
    shadow {
        enabled = false
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
    }
}

group {
    groupbar {
        col.active = rgb(7f12ff) rgb(1a1a1a) 90deg
        col.inactive = rgba(1a1a1add)
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Snappy, minimal animations
    bezier = snappy, 0.2, 1.0, 0.3, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = windows, 1, 3, snappy
    animation = windowsIn, 1, 3, snappy, popin 90%
    animation = windowsOut, 1, 2, quick, popin 90%
    animation = border, 1, 4, snappy
    animation = fade, 1, 3, quick
    animation = workspaces, 1, 3, snappy, fade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash = true
    vrr = 1
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.8 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = 0
    numlock_by_default = true
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, F, fullscreen
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod LALT, B, exec, $browser --incognito
bind = $mainMod, H, exec, helvum
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod, Q, exec, qalculate-gtk
bind = $mainMod SHIFT, E, exec, eww open --toggle sidebar

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# window = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
window = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
window = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

#windowrule = opacity 0.8 0.8, ^(kitty)$

#windowrule = float, ^(qalculate-gtk)$

window = opacity 0.0 override 0.0 override, class:^(xwaylandvideobridge)$
window = noanim, class:^(xwaylandvideobridge)$
window = noinitialfocus, class:^(xwaylandvideobridge)$
window = maxsize 1 1, class:^(xwaylandvideobridge)$
window = noblur, class:^(xwaylandvideobridge)$

ecosystem:no_update_news = false

# Use KDE platform theme for proper dark mode in Dolphin and KDE apps
env = QT_QPA_PLATFORMTHEME,kde
