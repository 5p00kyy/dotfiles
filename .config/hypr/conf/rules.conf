##############################
### WINDOWS AND WORKSPACES ###
##############################

window = suppressevent maximize, class:.*
window = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

window = opacity 0.0 override 0.0 override, class:^(xwaylandvideobridge)$
window = noanim, class:^(xwaylandvideobridge)$
window = noinitialfocus, class:^(xwaylandvideobridge)$
window = maxsize 1 1, class:^(xwaylandvideobridge)$
window = noblur, class:^(xwaylandvideobridge)$

ecosystem:no_update_news = true

# Ops dashboard
windowrulev2 = float,class:^(ops-dashboard)$
windowrulev2 = center,class:^(ops-dashboard)$
windowrulev2 = size 72% 78%,class:^(ops-dashboard)$
windowrulev2 = opacity 0.96 0.96,class:^(ops-dashboard)$
windowrulev2 = animation slide,class:^(ops-dashboard)$
