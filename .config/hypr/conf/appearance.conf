####################
### APPEARANCE ###
####################

source = ~/.config/hypr/conf/accent-colors.conf

general {
    gaps_in = 6
    gaps_out = 16

    col.inactive_border = rgba(30363daa)

    border_size = 1
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 0.98
    inactive_opacity = 0.93

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

group {
    groupbar {
        col.inactive = rgba(161b22ee)
    }
}

animations {
    enabled = true

    bezier = snappy, 0.2, 1.0, 0.3, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = windows, 1, 4, snappy
    animation = windowsIn, 1, 4, snappy, popin 94%
    animation = windowsOut, 1, 3, quick, popin 94%
    animation = border, 1, 5, snappy
    animation = fade, 1, 3, quick
    animation = workspaces, 1, 4, snappy, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = rgb(0d1117)
    vrr = 1
}
