####################
### APPEARANCE ###
####################

$activeBorderColor = rgba(3fb950ee) rgba(79c0ffee) 45deg
$inactiveBorderColor = rgba(5c6370aa)

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.98

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = false
    }
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor

    groupbar {
        font_size = 11
        font_family = JetBrainsMono Nerd Font
        font_weight_active = bold
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 4
        height = 22
        gaps_in = 4
        gaps_out = 0
        text_color = rgb(e6edf3)
        text_color_inactive = rgba(e6edf390)
        col.active = rgba(161b22ee)
        col.inactive = rgba(30363dbb)
        gradients = false
        gradient_rounding = 10
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 95%
    animation = windowsOut, 1, 1.49, linear, popin 95%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 3.2, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
    background_color = rgb(0d1117)
    vrr = 1
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}
