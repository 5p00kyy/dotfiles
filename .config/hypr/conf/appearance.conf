####################
### APPEARANCE ###
####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(61afefee) rgba(56b6c2ee) 45deg
    col.inactive_border = rgba(4c566aaa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.98

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000044)
    }

    blur {
        enabled = false
    }
}

group {
    col.border_active = rgba(61afefee) rgba(56b6c2ee) 45deg
    col.border_inactive = rgba(4c566aaa)

    groupbar {
        font_size = 11
        font_family = JetBrainsMono Nerd Font
        font_weight_active = bold
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 4
        height = 22
        gaps_in = 4
        gaps_out = 0
        text_color = rgb(e5e9f0)
        text_color_inactive = rgba(e5e9f090)
        col.active = rgba(2e3440ee)
        col.inactive = rgba(3b4252bb)
        gradients = false
        gradient_rounding = 6
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = quick,0.15,0,0.1,1
    animation = windows, 1, 4.5, easeOutQuint
    animation = windowsIn, 1, 4.0, easeOutQuint, popin 94%
    animation = windowsOut, 1, 1.5, quick, popin 94%
    animation = border, 1, 5, easeOutQuint
    animation = fade, 1, 3, quick
    animation = layers, 1, 3.5, easeOutQuint
    animation = workspaces, 1, 3.0, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
    background_color = rgb(1b1f27)
    vrr = 1
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}
