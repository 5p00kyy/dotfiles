general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot
    color = rgba(26, 26, 26, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(230, 230, 230, 1.0)
    inner_color = rgba(26, 26, 26, 1.0)
    font_color = rgba(230, 230, 230, 1.0)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i>unlock</i>
    hide_input = false
    position = 0, -110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(230, 230, 230, 1.0)
    font_size = 92
    font_family = JetBrainsMono Nerd Font
    position = 0, -290
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(180, 180, 180, 1.0)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -430
    halign = center
    valign = top
}
