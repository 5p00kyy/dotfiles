$font = JetBrainsMono Nerd Font
$accent = rgb(3fb950)
$fg = rgb(e6edf3)
$muted = rgb(8b949e)
$border = rgb(30363d)
$surface = rgba(22, 27, 34, 0.90)
$bg = rgba(13, 17, 23, 0.78)

general {
    hide_cursor = false
    grace = 2
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.01
    contrast = 1.0
    brightness = 0.82
    vibrancy = 0.12
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 520, 280
    color = $bg
    rounding = 0
    border_size = 1
    border_color = $border
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 54
    font_family = $font
    position = 0, 82
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $muted
    font_size = 14
    font_family = $font
    position = 0, 34
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER @ arch
    color = $accent
    font_size = 12
    font_family = $font
    position = 0, -18
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 44
    outline_thickness = 1
    inner_color = $surface
    outer_color = $border
    check_color = $accent
    fail_color = rgb(ff7b72)
    font_color = $fg
    fade_on_empty = false
    rounding = 0
    font_family = $font
    placeholder_text = <span foreground="#8b949e">[ enter password ]</span>
    fail_text = <span foreground="#ff7b72">[ $PAMFAIL ]</span>
    dots_spacing = 0.25
    dots_center = true
    position = 0, -72
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "[ $LAYOUT[EN,OTHER] ]"
    color = $muted
    font_size = 11
    font_family = $font
    position = 0, -118
    halign = center
    valign = center
}
